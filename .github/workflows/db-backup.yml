name: Daily DB backup

# Dumps the production database every day and stores it as a workflow
# artifact with 30-day retention. Uses the same secrets as db-deploy.
# Restore: download the artifact and `psql < finify-backup-<date>.sql`
# (or `supabase db reset` locally, then apply the dump).
on:
  schedule:
    - cron: "30 3 * * *" # 03:30 UTC daily (~00:30 ART)
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  backup:
    name: pg_dump to artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Bail out early if secrets are missing
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing one or more Supabase secrets. Configure SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Dump database (roles + schema + data)
        run: |
          set -euo pipefail
          stamp=$(date -u +%Y-%m-%d)
          supabase db dump -f "finify-backup-${stamp}.sql"
          supabase db dump --data-only -f "finify-backup-${stamp}-data.sql"
          ls -lh finify-backup-*.sql

      - name: Upload artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: finify-db-backup-${{ github.run_id }}
          path: finify-backup-*.sql
          retention-days: 30
          if-no-files-found: error
